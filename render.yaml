services:
  - type: web
    runtime: node
    name: recovermate-api
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: MONGO_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    runtime: static
    name: recovermate-web
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://recovermate-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
